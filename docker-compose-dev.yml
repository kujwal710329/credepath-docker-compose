services:
  # Backend Service — build from source with hot reload
  backend:
    build:
      context: ../credepath-backend
      dockerfile: Dockerfile
      target: development
    container_name: credepath-backend-dev
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: ${MONGODB_URI}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-90d}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      SENDER_EMAIL: ${SENDER_EMAIL}
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_BUCKET_NAME: ${AWS_BUCKET_NAME}
      JOB_RECOMMENDER_API_URL: ${JOB_RECOMMENDER_API_URL:-http://jobs-recommender:8000}
    volumes:
      - ../credepath-backend:/app
      - /app/node_modules
      - backend_logs:/app/logs
    networks:
      - credepath-network

  # ML Recommender Service — build from source
  jobs-recommender:
    build:
      context: ../jobs-recommender
      dockerfile: Dockerfile
      target: development
    container_name: credepath-jobs-recommender-dev
    restart: unless-stopped
    ports:
      - "${ML_SERVICE_PORT:-8000}:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      PINECONE_API_KEY: ${PINECONE_API_KEY}
      PINECONE_ENV: ${PINECONE_ENV}
      PINECONE_INDEX_NAME: ${PINECONE_INDEX_NAME}
      SKIP_API_KEY_CHECK: ${SKIP_API_KEY_CHECK:-true}
      API_HOST: ${ML_API_HOST:-0.0.0.0}
      API_PORT: ${ML_API_PORT:-8000}
    volumes:
      - ../jobs-recommender:/app
      - ml_cache:/app/.cache
    networks:
      - credepath-network

  # Frontend Service — build from source with hot reload
  frontend:
    build:
      context: ../credepath-frontend
      dockerfile: Dockerfile
      target: development
    container_name: credepath-frontend-dev
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:5000/api/v1}
      NEXT_PUBLIC_S3_BASE_URL: ${NEXT_PUBLIC_S3_BASE_URL}
    volumes:
      - ../credepath-frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
      - jobs-recommender
    networks:
      - credepath-network

networks:
  credepath-network:
    driver: bridge

volumes:
  backend_logs:
    driver: local
  ml_cache:
    driver: local
